<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Milestone Tracker (Jun - Dec 2026)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-6 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-900">AI Milestone & Implementation Tracker</h1>
            <p class="text-slate-600 mt-2">Track cross-functional AI initiatives from June 2026 to December 2026.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md h-fit border border-slate-200">
                <h2 class="text-xl font-semibold mb-4 text-slate-700">Add New Milestone</h2>
                <form id="milestone-form" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">Target Month</label>
                        <select id="month" class="w-full border rounded p-2 bg-slate-50" required>
                            <option value="June 2026">June 2026</option>
                            <option value="July 2026">July 2026</option>
                            <option value="August 2026">August 2026</option>
                            <option value="September 2026">September 2026</option>
                            <option value="October 2026">October 2026</option>
                            <option value="November 2026">November 2026</option>
                            <option value="December 2026">December 2026</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Team</label>
                        <select id="team" class="w-full border rounded p-2 bg-slate-50" required>
                            <option value="Marketing">Marketing</option>
                            <option value="Operations">Operations</option>
                            <option value="Customer Success">Customer Success</option>
                            <option value="Sales">Sales</option>
                            <option value="Customer Support">Customer Support</option>
                            <option value="Finance">Finance</option>
                            <option value="Development">Development</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Milestone Name</label>
                        <input type="text" id="milestone" class="w-full border rounded p-2 bg-slate-50" placeholder="e.g., Deploy AI Chatbot" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Application Name</label>
                        <input type="text" id="app" class="w-full border rounded p-2 bg-slate-50" placeholder="e.g., Intercom Fin" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Description</label>
                        <textarea id="description" class="w-full border rounded p-2 bg-slate-50 text-sm" rows="2" placeholder="What does this implementation entail?" required></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Purpose</label>
                        <textarea id="purpose" class="w-full border rounded p-2 bg-slate-50 text-sm" rows="2" placeholder="What is the ROI or goal?" required></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Current Success Tracker (%)</label>
                        <input type="number" id="progress" class="w-full border rounded p-2 bg-slate-50" min="0" max="100" value="0" required>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded hover:bg-blue-700 transition">
                        Add Milestone
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow-md border border-slate-200 overflow-x-auto">
                <h2 class="text-xl font-semibold mb-4 text-slate-700">Project Timeline</h2>
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider border-b">
                            <th class="p-3">Month</th>
                            <th class="p-3">Team</th>
                            <th class="p-3">Milestone & App</th>
                            <th class="p-3 w-1/3">Details</th>
                            <th class="p-3 text-center">Progress</th>
                            <th class="p-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tracker-body" class="text-sm">
                        </tbody>
                </table>
                <div id="empty-state" class="text-center text-slate-500 mt-8 hidden">
                    No milestones added yet. Start planning by adding one to the left!
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize data array from localStorage or empty array
        let milestones = JSON.parse(localStorage.getItem('aiMilestonesData')) || [];

        const form = document.getElementById('milestone-form');
        const trackerBody = document.getElementById('tracker-body');
        const emptyState = document.getElementById('empty-state');

        // Form Submit Handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newMilestone = {
                id: Date.now(),
                month: document.getElementById('month').value,
                team: document.getElementById('team').value,
                milestone: document.getElementById('milestone').value,
                app: document.getElementById('app').value,
                description: document.getElementById('description').value,
                purpose: document.getElementById('purpose').value,
                progress: document.getElementById('progress').value
            };

            milestones.push(newMilestone);
            saveData();
            renderTable();
            form.reset();
            document.getElementById('progress').value = 0; // reset progress specifically
        });

        // Save to LocalStorage
        function saveData() {
            localStorage.setItem('aiMilestonesData', JSON.stringify(milestones));
        }

        // Render Table Data
        function renderTable() {
            trackerBody.innerHTML = '';
            
            if (milestones.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            // Sort milestones roughly by month order
            const monthOrder = ["June 2026", "July 2026", "August 2026", "September 2026", "October 2026", "November 2026", "December 2026"];
            milestones.sort((a, b) => monthOrder.indexOf(a.month) - monthOrder.indexOf(b.month));

            milestones.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-slate-50 transition";
                
                // Color coding for progress bar
                let progressColor = "bg-blue-500";
                if (item.progress == 100) progressColor = "bg-green-500";
                
                tr.innerHTML = `
                    <td class="p-3 font-medium text-slate-700">${item.month}</td>
                    <td class="p-3"><span class="bg-indigo-100 text-indigo-800 px-2 py-1 rounded text-xs font-semibold">${item.team}</span></td>
                    <td class="p-3">
                        <div class="font-bold text-slate-800">${item.milestone}</div>
                        <div class="text-xs text-slate-500">App: ${item.app}</div>
                    </td>
                    <td class="p-3">
                        <div class="text-xs mb-1"><strong>Desc:</strong> ${item.description}</div>
                        <div class="text-xs text-slate-600"><strong>Goal:</strong> ${item.purpose}</div>
                    </td>
                    <td class="p-3 text-center">
                        <div class="flex flex-col items-center gap-1">
                            <span class="font-bold">${item.progress}%</span>
                            <div class="w-full bg-slate-200 rounded-full h-2.5">
                                <div class="${progressColor} h-2.5 rounded-full" style="width: ${item.progress}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="updateProgress(${item.id})" class="text-blue-600 hover:text-blue-800 text-xs font-semibold mr-2">Update %</button>
                        <button onclick="deleteMilestone(${item.id})" class="text-red-600 hover:text-red-800 text-xs font-semibold">Delete</button>
                    </td>
                `;
                trackerBody.appendChild(tr);
            });
        }

        // Update Progress
        window.updateProgress = function(id) {
            const itemIndex = milestones.findIndex(m => m.id === id);
            if(itemIndex > -1) {
                let newProgress = prompt("Update Success Tracker (0-100):", milestones[itemIndex].progress);
                if (newProgress !== null && newProgress !== "" && !isNaN(newProgress)) {
                    // Clamp between 0 and 100
                    newProgress = Math.max(0, Math.min(100, parseInt(newProgress)));
                    milestones[itemIndex].progress = newProgress;
                    saveData();
                    renderTable();
                }
            }
        }

        // Delete Milestone
        window.deleteMilestone = function(id) {
            if(confirm("Are you sure you want to delete this milestone?")) {
                milestones = milestones.filter(m => m.id !== id);
                saveData();
                renderTable();
            }
        }

        // Initial Render
        renderTable();
    </script>
</body>
</html>
