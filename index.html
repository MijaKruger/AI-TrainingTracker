<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Milestone Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for horizontal flowcharts */
        .flowchart-container::-webkit-scrollbar { height: 6px; }
        .flowchart-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-6 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-900">AI Milestone & Implementation Tracker</h1>
            <p class="text-slate-600 mt-2">Plan, edit, and track cross-functional AI initiatives. Data saves automatically to your browser.</p>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md h-fit border border-slate-200 xl:col-span-1 sticky top-6">
                <h2 id="form-title" class="text-xl font-semibold mb-4 text-slate-700">Add New Milestone</h2>
                <form id="milestone-form" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">Target Month</label>
                        <select id="month" class="w-full border rounded p-2 bg-slate-50" required>
                            <option value="June 2026">June 2026</option>
                            <option value="July 2026">July 2026</option>
                            <option value="August 2026">August 2026</option>
                            <option value="September 2026">September 2026</option>
                            <option value="October 2026">October 2026</option>
                            <option value="November 2026">November 2026</option>
                            <option value="December 2026">December 2026</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Team</label>
                        <select id="team" class="w-full border rounded p-2 bg-slate-50" required>
                            <option value="Marketing">Marketing</option>
                            <option value="Operations">Operations</option>
                            <option value="Customer Success">Customer Success</option>
                            <option value="Sales">Sales</option>
                            <option value="Customer Support">Customer Support</option>
                            <option value="Finance">Finance</option>
                            <option value="Development">Development</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Milestone Name</label>
                        <input type="text" id="milestone" class="w-full border rounded p-2 bg-slate-50" placeholder="e.g., Deploy AI Chatbot" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Application Name</label>
                        <input type="text" id="app" class="w-full border rounded p-2 bg-slate-50" placeholder="e.g., Intercom Fin" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Description</label>
                        <textarea id="description" class="w-full border rounded p-2 bg-slate-50 text-sm" rows="2" placeholder="What does this implementation entail?" required></textarea>
                    </div>

                    <div class="border p-3 rounded bg-slate-50">
                        <label class="block text-sm font-medium mb-2">Implementation Resources Added</label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">
                            <label class="flex items-center space-x-2"><input type="checkbox" name="resource" value="Video"> <span>Video</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" name="resource" value="Infographic"> <span>Infographic</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" name="resource" value="Practical Learning Activity"> <span>Practical Activity</span></label>
                            <label class="flex items-center space-x-2"><input type="checkbox" name="resource" value="Training Video"> <span>Training Video</span></label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Success Tracker (%)</label>
                            <input type="number" id="progress" class="w-full border rounded p-2 bg-slate-50" min="0" max="100" value="0" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Est. Time Saved (%)</label>
                            <input type="number" id="time-saved" class="w-full border rounded p-2 bg-slate-50" min="0" max="100" value="0" required>
                        </div>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-semibold py-2 rounded hover:bg-blue-700 transition">
                            Add Milestone
                        </button>
                        <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden w-1/3 bg-slate-300 text-slate-700 font-semibold py-2 rounded hover:bg-slate-400 transition">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <div class="xl:col-span-2 space-y-8" id="team-sections-container">
                <div id="empty-state" class="text-center text-slate-500 mt-8 bg-white p-8 rounded-lg shadow border border-slate-200 hidden">
                    No milestones added yet. Start planning by adding one to the left!
                </div>
            </div>
        </div>
    </div>

    <script>
        // App State
        let milestones = JSON.parse(localStorage.getItem('aiMilestonesDataV2')) || [];
        let editingId = null;

        // Team configurations with distinct Pastel Colors
        const teamConfig = {
            "Marketing": { bg: "bg-rose-50", border: "border-rose-200", text: "text-rose-900", bar: "bg-rose-400" },
            "Operations": { bg: "bg-amber-50", border: "border-amber-200", text: "text-amber-900", bar: "bg-amber-400" },
            "Customer Success": { bg: "bg-emerald-50", border: "border-emerald-200", text: "text-emerald-900", bar: "bg-emerald-400" },
            "Sales": { bg: "bg-sky-50", border: "border-sky-200", text: "text-sky-900", bar: "bg-sky-400" },
            "Customer Support": { bg: "bg-violet-50", border: "border-violet-200", text: "text-violet-900", bar: "bg-violet-400" },
            "Finance": { bg: "bg-cyan-50", border: "border-cyan-200", text: "text-cyan-900", bar: "bg-cyan-400" },
            "Development": { bg: "bg-fuchsia-50", border: "border-fuchsia-200", text: "text-fuchsia-900", bar: "bg-fuchsia-400" }
        };

        const monthOrder = ["June 2026", "July 2026", "August 2026", "September 2026", "October 2026", "November 2026", "December 2026"];

        const form = document.getElementById('milestone-form');
        const container = document.getElementById('team-sections-container');
        const emptyState = document.getElementById('empty-state');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-edit-btn');
        const formTitle = document.getElementById('form-title');

        // Form Submission (Add or Edit)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Gather checked resources
            const resourceCheckboxes = document.querySelectorAll('input[name="resource"]:checked');
            const resources = Array.from(resourceCheckboxes).map(cb => cb.value);

            const milestoneData = {
                id: editingId ? editingId : Date.now(),
                month: document.getElementById('month').value,
                team: document.getElementById('team').value,
                milestone: document.getElementById('milestone').value,
                app: document.getElementById('app').value,
                description: document.getElementById('description').value,
                resources: resources,
                progress: document.getElementById('progress').value,
                timeSaved: document.getElementById('time-saved').value
            };

            if (editingId) {
                // Update existing
                const index = milestones.findIndex(m => m.id === editingId);
                milestones[index] = milestoneData;
                cancelEdit(); // resets form state
            } else {
                // Add new
                milestones.push(milestoneData);
                form.reset();
                document.getElementById('progress').value = 0;
                document.getElementById('time-saved').value = 0;
            }

            saveData();
            renderSections();
        });

        function saveData() {
            localStorage.setItem('aiMilestonesDataV2', JSON.stringify(milestones));
        }

        // Edit Mode Initialization
        window.editMilestone = function(id) {
            const item = milestones.find(m => m.id === id);
            if(!item) return;

            editingId = id;
            formTitle.innerText = "Edit Milestone";
            submitBtn.innerText = "Update Milestone";
            cancelBtn.classList.remove('hidden');

            document.getElementById('month').value = item.month;
            document.getElementById('team').value = item.team;
            document.getElementById('milestone').value = item.milestone;
            document.getElementById('app').value = item.app;
            document.getElementById('description').value = item.description;
            document.getElementById('progress').value = item.progress;
            document.getElementById('time-saved').value = item.timeSaved || 0;

            // Reset and set checkboxes
            document.querySelectorAll('input[name="resource"]').forEach(cb => cb.checked = false);
            if(item.resources) {
                item.resources.forEach(res => {
                    const cb = document.querySelector(`input[name="resource"][value="${res}"]`);
                    if(cb) cb.checked = true;
                });
            }
            
            // Scroll to top to see form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Cancel Edit Mode
        window.cancelEdit = function() {
            editingId = null;
            formTitle.innerText = "Add New Milestone";
            submitBtn.innerText = "Add Milestone";
            cancelBtn.classList.add('hidden');
            form.reset();
            document.getElementById('progress').value = 0;
            document.getElementById('time-saved').value = 0;
        }

        // Delete Milestone
        window.deleteMilestone = function(id) {
            if(confirm("Are you sure you want to delete this milestone?")) {
                milestones = milestones.filter(m => m.id !== id);
                if(editingId === id) cancelEdit();
                saveData();
                renderSections();
            }
        }

        // Render the grouped sections and flowcharts
        function renderSections() {
            // Clear current view but keep the empty state div
            Array.from(container.children).forEach(child => {
                if(child.id !== 'empty-state') child.remove();
            });
            
            if (milestones.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            // Group milestones by team
            const grouped = {};
            Object.keys(teamConfig).forEach(team => grouped[team] = []); // ensure order

            milestones.forEach(m => {
                if(grouped[m.team]) grouped[m.team].push(m);
            });

            // Render each team that has data
            Object.keys(grouped).forEach(teamName => {
                const teamMilestones = grouped[teamName];
                if(teamMilestones.length === 0) return;

                // Sort by chronological month
                teamMilestones.sort((a, b) => monthOrder.indexOf(a.month) - monthOrder.indexOf(b.month));
                
                const style = teamConfig[teamName];
                
                // Create Team Wrapper
                const section = document.createElement('div');
                section.className = `${style.bg} border ${style.border} rounded-lg shadow-sm overflow-hidden mb-6`;

                // Section Header
                const header = document.createElement('div');
                header.className = `p-4 border-b ${style.border} font-bold text-lg ${style.text} flex justify-between items-center bg-white/40`;
                header.innerHTML = `<span>${teamName} Team</span> <span class="text-sm font-normal bg-white px-3 py-1 rounded-full shadow-sm">${teamMilestones.length} Tasks</span>`;
                section.appendChild(header);

                // Tasks List
                const listWrapper = document.createElement('div');
                listWrapper.className = "p-4 space-y-4";
                
                teamMilestones.forEach((item, index) => {
                    const taskNumber = index + 1;
                    const resourceBadges = (item.resources && item.resources.length > 0) 
                        ? item.resources.map(r => `<span class="inline-block bg-white border border-gray-300 text-gray-600 text-[10px] px-2 py-0.5 rounded mr-1 mt-1">${r}</span>`).join('')
                        : '<span class="text-xs text-gray-400 italic">No resources attached</span>';

                    const taskCard = document.createElement('div');
                    taskCard.className = "bg-white/80 p-4 rounded border border-white shadow-sm flex flex-col md:flex-row gap-4 justify-between items-start";
                    
                    taskCard.innerHTML = `
                        <div class="flex-1 w-full">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="${style.text} font-black text-lg">#${taskNumber}</span>
                                <h3 class="font-bold text-slate-800">${item.milestone}</h3>
                                <span class="text-xs bg-slate-200 text-slate-700 px-2 py-1 rounded font-medium">${item.month}</span>
                            </div>
                            <div class="text-sm text-slate-600 mb-2"><strong>App:</strong> ${item.app}</div>
                            <p class="text-sm text-slate-700 mb-3">${item.description}</p>
                            <div>
                                <strong class="text-xs uppercase text-slate-500 tracking-wider">Resources:</strong><br>
                                ${resourceBadges}
                            </div>
                        </div>

                        <div class="w-full md:w-64 flex flex-col gap-3 border-t md:border-t-0 md:border-l border-slate-200 pt-3 md:pt-0 md:pl-4">
                            <div>
                                <div class="flex justify-between text-xs mb-1 font-semibold text-slate-700">
                                    <span>Success Tracker</span>
                                    <span>${item.progress}%</span>
                                </div>
                                <div class="w-full bg-slate-200 rounded-full h-2">
                                    <div class="${style.bar} h-2 rounded-full" style="width: ${item.progress}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-1 font-semibold text-slate-700">
                                    <span>Est. Time Saved</span>
                                    <span>${item.timeSaved || 0}%</span>
                                </div>
                                <div class="w-full bg-slate-200 rounded-full h-2">
                                    <div class="bg-green-500 h-2 rounded-full" style="width: ${item.timeSaved || 0}%"></div>
                                </div>
                            </div>
                            
                            <div class="flex justify-end gap-3 mt-2">
                                <button onclick="editMilestone(${item.id})" class="text-blue-600 hover:text-blue-800 text-sm font-semibold transition">Edit</button>
                                <button onclick="deleteMilestone(${item.id})" class="text-red-600 hover:text-red-800 text-sm font-semibold transition">Delete</button>
                            </div>
                        </div>
                    `;
                    listWrapper.appendChild(taskCard);
                });
                
                section.appendChild(listWrapper);

                // --- Flowchart Generation ---
                if (teamMilestones.length > 0) {
                    const flowHeader = document.createElement('div');
                    flowHeader.className = `px-4 pt-2 text-xs font-bold uppercase tracking-wider ${style.text} opacity-70`;
                    flowHeader.innerText = "Implementation Flowchart";
                    section.appendChild(flowHeader);

                    const flowContainer = document.createElement('div');
                    flowContainer.className = "flex items-center gap-2 overflow-x-auto p-4 flowchart-container whitespace-nowrap bg-white/30 border-t border-white/50";
                    
                    teamMilestones.forEach((item, index) => {
                        const taskNumber = index + 1;
                        
                        // Node
                        const node = document.createElement('div');
                        node.className = "min-w-fit bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200 flex flex-col items-center justify-center text-center";
                        node.innerHTML = `
                            <div class="text-xs font-bold text-slate-500 mb-1">${item.month}</div>
                            <div class="font-bold text-sm text-slate-800">#${taskNumber} ${item.milestone}</div>
                            <div class="text-xs text-slate-500 mt-1">${item.app}</div>
                        `;
                        flowContainer.appendChild(node);

                        // Arrow (if not last item)
                        if (index < teamMilestones.length - 1) {
                            const arrow = document.createElement('div');
                            arrow.className = `text-xl ${style.text} opacity-50`;
                            arrow.innerHTML = "➔";
                            flowContainer.appendChild(arrow);
                        }
                    });

                    section.appendChild(flowContainer);
                }

                container.appendChild(section);
            });
        }

        // Initial Render
        renderSections();
    </script>
</body>
</html>
